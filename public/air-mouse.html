<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Air Mouse — Merkez CRM</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    :root {
      --blue: #6366f1;
      --green: #22c55e;
      --red: #ef4444;
      --bg: #07071a;
      --card: rgba(255,255,255,0.05);
      --border: rgba(255,255,255,0.08);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', sans-serif;
      background: var(--bg);
      color: #fff;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ─────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      background: rgba(7,7,26,0.9);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      z-index: 10;
      flex-shrink: 0;
    }

    .logo { font-size: 17px; font-weight: 900; letter-spacing: -0.02em; }
    .logo span { color: var(--blue); }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      background: var(--card);
      border: 1px solid var(--border);
      transition: all 0.3s;
    }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--red);
      transition: background 0.3s, box-shadow 0.3s;
    }
    .dot.on  { background: var(--green); box-shadow: 0 0 10px rgba(34,197,94,0.7); }
    .dot.tracking { background: var(--blue); box-shadow: 0 0 10px rgba(99,102,241,0.7); animation: blink 1.4s infinite; }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.5} }

    /* ── Camera area ────────────────────────── */
    .camera-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #000;
    }

    video, canvas {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
    }
    canvas { z-index: 2; }

    /* ── Pinch indicator ────────────────────── */
    .pinch-indicator {
      position: absolute;
      top: 20px; left: 50%;
      transform: translateX(-50%) scale(0);
      z-index: 5;
      background: rgba(34,197,94,0.85);
      backdrop-filter: blur(12px);
      padding: 8px 20px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
      pointer-events: none;
    }
    .pinch-indicator.show { transform: translateX(-50%) scale(1); }

    /* ── No-hand overlay ────────────────────── */
    .no-hand {
      position: absolute;
      inset: 0; z-index: 3;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: rgba(7,7,26,0.65);
      backdrop-filter: blur(6px);
      transition: opacity 0.4s;
    }
    .no-hand.hidden { opacity: 0; pointer-events: none; }
    .no-hand .emoji { font-size: 72px; }
    .no-hand p { font-size: 15px; font-weight: 700; color: rgba(255,255,255,0.6); }

    /* ── Stats strip ─────────────────────────── */
    .stats {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      z-index: 4;
      display: flex;
      gap: 10px;
      padding: 16px;
      background: linear-gradient(transparent, rgba(7,7,26,0.9));
    }

    .stat-card {
      flex: 1;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px 12px;
    }
    .stat-label { font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.15em; color: rgba(255,255,255,0.3); margin-bottom: 4px; }
    .stat-value { font-size: 18px; font-weight: 900; font-variant-numeric: tabular-nums; }

    /* ── Footer ─────────────────────────────── */
    footer {
      padding: 16px 20px;
      background: rgba(7,7,26,0.95);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .session-badge {
      text-align: center;
      font-size: 11px;
      font-weight: 700;
      color: rgba(255,255,255,0.3);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 12px;
    }
    .session-badge strong {
      color: var(--blue);
      font-size: 15px;
      letter-spacing: 0.2em;
    }

    .gesture-hint {
      display: flex;
      gap: 10px;
    }
    .hint-card {
      flex: 1;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
      text-align: center;
      font-size: 11px;
      font-weight: 700;
      color: rgba(255,255,255,0.5);
      line-height: 1.5;
    }
    .hint-card .icon { font-size: 24px; display: block; margin-bottom: 6px; }

    /* ── Iframe Mode overrides ── */
    body.mode-iframe header { display: none !important; }
    body.mode-iframe footer { display: none !important; }
    body.mode-iframe .stats { display: none !important; }
    body.mode-iframe .camera-wrap { height: 100vh; flex: 1; }
    body.mode-iframe .no-hand .emoji { font-size: 32px; }
    body.mode-iframe .no-hand p { font-size: 10px; text-align: center; padding: 0 8px; }
    body.mode-iframe .pinch-indicator { font-size: 10px; padding: 3px 10px; top: 10px; }

    /* ── Calibration & Custom buttons ── */
    .cal-btn {
      position: absolute;
      top: 12px; left: 12px;
      z-index: 5;
      background: rgba(7,7,26,0.6);
      border: 1px solid var(--border);
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #fff;
      font-size: 14px;
      transition: background 0.2s, transform 0.1s;
    }
    .cal-btn:hover { background: var(--blue); }
    .cal-btn:active { transform: scale(0.9); }

    body.mode-iframe .cal-btn {
      top: 6px; left: 6px;
      width: 22px; height: 22px;
      font-size: 10px;
    }

  </style>
</head>
<body>

  <header>
    <div class="logo"><span>digit</span>all.llc — Air Mouse</div>
    <div style="display: flex; align-items: center; gap: 8px;">
      <button onclick="openCalibration()" style="padding: 6px 12px; border-radius: 999px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; background: var(--card); border: 1px solid var(--border); color: #fff; cursor: pointer; transition: all 0.3s;" onmouseenter="this.style.background='rgba(99,102,241,0.2)'" onmouseleave="this.style.background='var(--card)'">🎯 Калибровка</button>
      <div class="status-pill">
        <div class="dot" id="dot"></div>
        <span id="statusLabel">Подключение...</span>
      </div>
    </div>
  </header>

  <div class="camera-wrap">
    <button class="cal-btn" onclick="openCalibration()" title="Калибровать рабочую область">🎯</button>
    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="overlay"></canvas>

    <div class="pinch-indicator" id="pinchIndicator">🤏 Клик!</div>

    <div class="no-hand" id="noHand">
      <span class="emoji">🖐️</span>
      <p>Поднесите руку к камере</p>
    </div>

    <!-- Диагностический лог -->
    <div id="calLog" style="display: none; position: absolute; top: 35px; left: 10px; right: 10px; background: rgba(7,7,26,0.9); color: #22c55e; font-family: monospace; font-size: 8px; z-index: 10; max-height: 70px; overflow-y: auto; pointer-events: none; text-align: left; padding: 6px; border-radius: 6px; border: 1px solid rgba(34,197,94,0.3); line-height: 1.2;"></div>

    <!-- Оверлей калибровки -->
    <div id="calibrationOverlay" style="display: none; position: absolute; bottom: 0; left: 0; right: 0; background: rgba(7, 7, 26, 0.75); backdrop-filter: blur(8px); border-top: 1px solid var(--border); z-index: 6; flex-direction: column; align-items: center; justify-content: center; gap: 8px; padding: 12px; text-align: center;">
      <h3 style="font-size: 11px; font-weight: 850; color: var(--blue); text-transform: uppercase; letter-spacing: 0.05em; margin: 0;">Калибровка 🎯</h3>
      <p id="calibrationPrompt" style="font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.9); max-width: 200px; line-height: 1.3; margin: 0 auto;">Настроим чувствительность под размах ваших движений.</p>
      <div id="progressContainer" style="width: 120px; height: 5px; background: rgba(255,255,255,0.1); border-radius: 99px; overflow: hidden; display: none; margin: 4px auto 0;">
        <div id="calibrationProgress" style="width: 0%; height: 100%; background: linear-gradient(90deg, var(--blue), var(--green)); transition: width 0.05s linear;"></div>
      </div>
      <button id="calibrationBtn" onclick="startCalibrationSequence()" style="margin-top: 4px; padding: 6px 16px; border-radius: 99px; background: var(--blue); border: none; color: #fff; font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; cursor: pointer; transition: transform 0.2s, background 0.2s;">Начать</button>
      <div id="calDebug" style="font-size: 8px; color: rgba(255,255,255,0.3); margin-top: 2px;">Статус: NONE</div>
    </div>

    <div class="stats">
      <div class="stat-card">
        <div class="stat-label">Позиция X</div>
        <div class="stat-value" id="sX">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Позиция Y</div>
        <div class="stat-value" id="sY">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Pinch</div>
        <div class="stat-value" id="sPinch">—</div>
      </div>
    </div>
  </div>

  <footer>
    <div class="session-badge">Сессия: <strong id="sessionCode">—</strong></div>
    <div class="gesture-hint">
      <div class="hint-card"><span class="icon">✋</span>Ладонь<br>= Курсор</div>
      <div class="hint-card"><span class="icon">🤏</span>Сжать пальцы<br>= Клик</div>
    </div>
  </footer>

  <!-- Supabase JS (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <!-- MediaPipe Hands -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

  <script>
    // Global Error Handler for on-screen diagnostics
    window.onerror = function(message, source, lineno, colno, error) {
      const logEl = document.getElementById('calLog');
      if (logEl) {
        logEl.style.display = 'block';
        logEl.innerHTML += `<span style="color: #ef4444;">[ОШИБКА] ${message} (строка ${lineno})</span><br>`;
        logEl.scrollTop = logEl.scrollHeight;
      }
      return false;
    };

    // ═══════════════════════════════════════════════════════
    //  КОНФИГУРАЦИЯ
    // ═══════════════════════════════════════════════════════

    // Production Supabase (anon key — публичный, OK)
    const SUPABASE_URL  = 'https://rvywrxnmgwwudihgrxdp.supabase.co';
    const SUPABASE_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ2eXdyeG5tZ3d3dWRpaGdyeGRwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNjIzNjYsImV4cCI6MjA5MDgzODM2Nn0.iD3osORy7nR5wlhjuyiXKiGt-6s7VGpmbeim_GHw2wI';

    const PINCH_START_THRESH   = 0.065;
    const PINCH_RELEASE_THRESH = 0.095;
    const SMOOTHING            = 0.60;
    const SEND_INTERVAL_MS     = 20;   // ~50fps

    // ─── Получить код сессии из URL (?session=ABCDEF) ───────
    const params      = new URLSearchParams(location.search);
    const sessionCode = params.get('session') || 'DEMO';
    const channelName = `air-mouse-${sessionCode}`;

    if (params.get('mode') === 'iframe') {
      document.body.classList.add('mode-iframe');
    }

    document.getElementById('sessionCode').textContent = sessionCode;

    // ═══════════════════════════════════════════════════════
    //  SUPABASE REALTIME BROADCAST
    // ═══════════════════════════════════════════════════════

    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

    let channel = null;
    let isConnected = false;

    const dot         = document.getElementById('dot');
    const statusLabel = document.getElementById('statusLabel');

    function setStatus(state, label) {
      dot.className = 'dot ' + state;
      statusLabel.textContent = label;
    }

    async function connectSupabase() {
      channel = sb.channel(channelName, { config: { broadcast: { self: false } } });

      channel.subscribe((status) => {
        if (status === 'SUBSCRIBED') {
          isConnected = true;
          setStatus('on', 'Подключено');
        } else if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT') {
          isConnected = false;
          setStatus('', 'Ошибка соединения');
          setTimeout(connectSupabase, 3000);
        }
      });
    }

    connectSupabase();

    // Отправка жеста в канал
    function sendGesture(payload) {
      if (!isConnected || !channel) return;
      channel.send({ type: 'broadcast', event: 'gesture', payload });
    }

    // ═══════════════════════════════════════════════════════
    //  СОСТОЯНИЕ ТРЕКИНГА & КАЛИБРОВКА & УСКОРЕНИЕ
    // ═══════════════════════════════════════════════════════

    // Коэффициенты по умолчанию
    const BASE_GAIN = 1.0;
    const ACCEL_COEFF = 3.5; // Коэффициент pointer acceleration (динамического ускорения)
    
    // Границы рабочей зоны (Bounding Box)
    // По умолчанию: 65% ширины кадра и 60% высоты кадра от центра
    let limits = {
      xMin: 0.175, // 0.5 - 0.65/2
      xMax: 0.825, // 0.5 + 0.65/2
      yMin: 0.200, // 0.5 - 0.60/2
      yMax: 0.800  // 0.5 + 0.60/2
    };

    // Загрузка калиброванных значений, если они есть
    try {
      const savedLimits = localStorage.getItem('merkez_airmouse_limits');
      if (savedLimits) {
        limits = JSON.parse(savedLimits);
      }
    } catch (e) {
      console.error('Ошибка загрузки калибровки', e);
    }

    // Состояние калибровки
    window.calibrationState = 'NONE'; // 'NONE', 'START', 'CALIBRATING_X', 'CALIBRATING_Y', 'DONE'
    window.calibrationData = { xRaw: [], yRaw: [] };
    let calibrationProgressTimer = null;
    let calibrationStepDuration = 5000; // 5 секунд на каждый шаг

    // Переменные для вычисления ускорения
    let lastMappedX = 0.5;
    let lastMappedY = 0.5;
    let cursorX = 0.5;
    let cursorY = 0.5;
    let lastFrameTime = performance.now();
    let handDetectedLastFrame = false;

    // Логирование диагностики
    function logDebug(msg) {
      const logEl = document.getElementById('calLog');
      if (logEl) {
        logEl.innerHTML += `[${new Date().toLocaleTimeString()}] ${msg}<br>`;
        logEl.scrollTop = logEl.scrollHeight;
      }
    }

    // Функции калибровки
    function openCalibration() {
      // Отправляем сигнал родителю, чтобы развернуть виджет на весь экран
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({ type: 'airmouse_calibrating_start' }, '*');
      }

      const logEl = document.getElementById('calLog');
      if (logEl) {
        logEl.style.display = 'block';
        logEl.innerHTML = '--- Диагностика калибровки ---<br>';
      }
      logDebug('Окно калибровки открыто.');

      const overlay = document.getElementById('calibrationOverlay');
      overlay.style.display = 'flex';
      
      const prompt = document.getElementById('calibrationPrompt');
      prompt.textContent = 'Держите руку перед камерой по центру и приготовьтесь делать взмахи.';
      
      const btn = document.getElementById('calibrationBtn');
      btn.style.display = 'block';
      btn.textContent = 'Начать';
      
      const progressContainer = document.getElementById('progressContainer');
      progressContainer.style.display = 'none';
      
      window.calibrationState = 'START';
    }

    function startCalibrationSequence() {
      logDebug('Начата калибровка. Шаг 1...');
      const btn = document.getElementById('calibrationBtn');
      btn.style.display = 'none';
      
      const progressContainer = document.getElementById('progressContainer');
      progressContainer.style.display = 'block';
      
      const prompt = document.getElementById('calibrationPrompt');
      prompt.innerHTML = '👉 <strong>ШАГ 1:</strong><br>Плавно взмахните рукой влево и вправо несколько раз в комфортных границах.';
      
      window.calibrationState = 'CALIBRATING_X';
      window.calibrationData = { xRaw: [], yRaw: [] };
    }

    function finishCalibration() {
      window.calibrationState = 'DONE';
      
      const prompt = document.getElementById('calibrationPrompt');
      const progressContainer = document.getElementById('progressContainer');
      
      logDebug(`finishCalibration: X size: ${window.calibrationData.xRaw.length}, Y size: ${window.calibrationData.yRaw.length}`);
      
      // Фильтруем данные от шумов
      if (window.calibrationData.xRaw.length >= 3 && window.calibrationData.yRaw.length >= 3) {
        // Сортируем, чтобы откинуть 5% крайних выбросов с обоих концов
        window.calibrationData.xRaw.sort((a,b) => a - b);
        window.calibrationData.yRaw.sort((a,b) => a - b);
        
        const trimX = Math.floor(window.calibrationData.xRaw.length * 0.05);
        const trimY = Math.floor(window.calibrationData.yRaw.length * 0.05);
        
        const cleanX = window.calibrationData.xRaw.slice(trimX, window.calibrationData.xRaw.length - trimX);
        const cleanY = window.calibrationData.yRaw.slice(trimY, window.calibrationData.yRaw.length - trimY);
        
        const xMin = cleanX[0];
        const xMax = cleanX[cleanX.length - 1];
        const yMin = cleanY[0];
        const yMax = cleanY[cleanY.length - 1];
        
        // Проверяем валидность размаха (чтобы не было деления на 0 при слишком малом движении)
        const dx = xMax - xMin;
        const dy = yMax - yMin;
        
        logDebug(`Диапазоны: X: ${xMin.toFixed(3)} - ${xMax.toFixed(3)} (dx: ${dx.toFixed(3)}), Y: ${yMin.toFixed(3)} - ${yMax.toFixed(3)} (dy: ${dy.toFixed(3)})`);

        if (dx > 0.15 && dy > 0.15) {
          limits.xMin = xMin;
          limits.xMax = xMax;
          limits.yMin = yMin;
          limits.yMax = yMax;
          
          localStorage.setItem('merkez_airmouse_limits', JSON.stringify(limits));
          prompt.innerHTML = '<strong>Готово! 🎯</strong><br>Параметры успешно сохранены в браузер.';
          logDebug('Калибровка сохранена успешно!');
        } else {
          prompt.innerHTML = '<strong>Малая амплитуда ⚠️</strong><br>Взмахи были слишком маленькими. Восстановлены настройки по умолчанию.';
          resetToDefaultLimits();
          logDebug('Ошибка: Малая амплитуда движения!');
        }
      } else {
        prompt.innerHTML = '<strong>Рука не обнаружена 🖐️❌</strong><br>Восстановлены настройки по умолчанию.';
        resetToDefaultLimits();
        logDebug('Ошибка: Мало точек для калибровки!');
      }
      
      progressContainer.style.display = 'none';
      
      setTimeout(() => {
        document.getElementById('calibrationOverlay').style.display = 'none';
        const logEl = document.getElementById('calLog');
        if (logEl) logEl.style.display = 'none';
        window.calibrationState = 'NONE';

        // Отправляем сигнал родителю о завершении калибровки
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'airmouse_calibrating_end' }, '*');
        }
      }, 4000);
    }

    function resetToDefaultLimits() {
      limits = {
        xMin: 0.175,
        xMax: 0.825,
        yMin: 0.200,
        yMax: 0.800
      };
      localStorage.removeItem('merkez_airmouse_limits');
    }

    // Экспортируем в window для надежности вызова из инлайновых onclick
    window.openCalibration = openCalibration;
    window.startCalibrationSequence = startCalibrationSequence;

    // Инициализация элементов DOM и переменных камеры
    const videoEl  = document.getElementById('webcam');
    const canvasEl = document.getElementById('overlay');
    const ctx      = canvasEl.getContext('2d');
    const noHand   = document.getElementById('noHand');
    const pinchInd = document.getElementById('pinchIndicator');

    function dist(a, b) {
      return Math.sqrt((a.x-b.x)**2 + (a.y-b.y)**2);
    }

    // Инициализация MediaPipe Hands
    const hands = new Hands({
      locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
    });

    hands.setOptions({
      maxNumHands: 1,
      modelComplexity: 1,
      minDetectionConfidence: 0.55,
      minTrackingConfidence: 0.5,
    });

    hands.onResults((results) => {
      canvasEl.width  = results.image.width;
      canvasEl.height = results.image.height;
      ctx.clearRect(0, 0, canvasEl.width, canvasEl.height);

      // Рисуем рамку рабочей зоны (Bounding Box) на Canvas с полупрозрачным затемнением краев
      const canvasW = canvasEl.width;
      const canvasH = canvasEl.height;
      
      // 1. Dotted / Dashed Neon Indigo Box
      ctx.strokeStyle = 'rgba(99, 102, 241, 0.45)'; // Indigo
      ctx.lineWidth = 3;
      ctx.setLineDash([8, 6]);
      ctx.strokeRect(
        limits.xMin * canvasW,
        limits.yMin * canvasH,
        (limits.xMax - limits.xMin) * canvasW,
        (limits.yMax - limits.yMin) * canvasH
      );
      ctx.setLineDash([]); // Reset dash style

      // 2. Semi-transparent dark overlay outside of Bounding Box
      ctx.fillStyle = 'rgba(7, 7, 26, 0.35)';
      ctx.fillRect(0, 0, canvasW, limits.yMin * canvasH); // Top
      ctx.fillRect(0, limits.yMax * canvasH, canvasW, canvasH - limits.yMax * canvasH); // Bottom
      ctx.fillRect(0, limits.yMin * canvasH, limits.xMin * canvasW, (limits.yMax - limits.yMin) * canvasH); // Left
      ctx.fillRect(limits.xMax * canvasW, limits.yMin * canvasH, canvasW - limits.xMax * canvasW, (limits.yMax - limits.yMin) * canvasH); // Right

      // 3. Label text "РАБОЧАЯ ЗОНА"
      ctx.fillStyle = 'rgba(255, 255, 255, 0.45)';
      ctx.font = 'bold 12px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(
        'РАБОЧАЯ ЗОНА', 
        (limits.xMin + limits.xMax) * 0.5 * canvasW, 
        (limits.yMin * canvasH) - 8
      );

      if (!results.multiHandLandmarks?.length) {
        noHand.classList.remove('hidden');
        if (isConnected) setStatus('on', 'Подключено');
        document.getElementById('sX').textContent = '—';
        document.getElementById('sY').textContent = '—';
        document.getElementById('sPinch').textContent = '—';
        handDetectedLastFrame = false;

        const debugEl = document.getElementById('calDebug');
        if (debugEl) {
          debugEl.textContent = `Статус: ${window.calibrationState}, X: ${window.calibrationData.xRaw.length}, Y: ${window.calibrationData.yRaw.length}, Рука: НЕТ`;
        }

        return;
      }

      noHand.classList.add('hidden');

      const lm = results.multiHandLandmarks[0];

      const debugEl = document.getElementById('calDebug');
      if (debugEl) {
        debugEl.textContent = `Статус: ${window.calibrationState}, X: ${window.calibrationData.xRaw.length}, Y: ${window.calibrationData.yRaw.length}, Рука: OK`;
      }

      // Рисуем скелет руки
      drawConnectors(ctx, lm, HAND_CONNECTIONS, { color: 'rgba(99,102,241,0.4)', lineWidth: 2 });
      drawLandmarks(ctx, lm, { color: 'rgba(139,92,246,0.8)', fillColor: 'rgba(99,102,241,0.3)', lineWidth: 1, radius: 3 });

      // Точки: 9=ладонь, 4=большой, 8=указательный
      const palm  = lm[9];
      const thumb = lm[4];
      const index = lm[8];

      // Зеркалим X (фронтальная камера)
      const rawX = 1 - palm.x;
      const rawY = palm.y;

      // Если мы калибруемся, собираем сырые координаты
      if (window.calibrationState === 'CALIBRATING_X') {
        window.calibrationData.xRaw.push(rawX);
        const count = window.calibrationData.xRaw.length;
        const pct = Math.min(100, (count / 80) * 100);
        document.getElementById('calibrationProgress').style.width = pct + '%';
        document.getElementById('calibrationPrompt').innerHTML = `👉 <strong>ШАГ 1:</strong><br>Плавно взмахните рукой влево и вправо.<br><span style="color: var(--green); font-weight: 700; font-size: 11px;">Собрано: ${count} / 80 точек</span>`;
        if (count >= 80) {
          window.calibrationState = 'CALIBRATING_Y';
          document.getElementById('calibrationProgress').style.width = '0%';
          logDebug('Шаг 1 завершен. Переход к Шагу 2...');
        }
      } else if (window.calibrationState === 'CALIBRATING_Y') {
        window.calibrationData.yRaw.push(rawY);
        const count = window.calibrationData.yRaw.length;
        const pct = Math.min(100, (count / 80) * 100);
        document.getElementById('calibrationProgress').style.width = pct + '%';
        document.getElementById('calibrationPrompt').innerHTML = `👇 <strong>ШАГ 2:</strong><br>Плавно взмахните рукой вверх и вниз.<br><span style="color: var(--green); font-weight: 700; font-size: 11px;">Собрано: ${count} / 80 точек</span>`;
        if (count >= 80) {
          logDebug('Шаг 2 завершен. Завершаем калибровку...');
          finishCalibration();
        }
      }

      // 1. Применяем границы Bounding Box
      const limitW = limits.xMax - limits.xMin;
      const limitH = limits.yMax - limits.yMin;

      let mappedX = (rawX - limits.xMin) / (limitW || 1);
      let mappedY = (rawY - limits.yMin) / (limitH || 1);

      mappedX = Math.max(0, Math.min(1, mappedX));
      mappedY = Math.max(0, Math.min(1, mappedY));

      // Если рука только появилась, сбрасываем фильтры на текущую позицию руки
      if (!handDetectedLastFrame) {
        lastMappedX = mappedX;
        lastMappedY = mappedY;
        cursorX = mappedX;
        cursorY = mappedY;
        smoothX = mappedX;
        smoothY = mappedY;
        lastFrameTime = performance.now();
        handDetectedLastFrame = true;
      }

      // 2. Вычисляем динамическое ускорение (Pointer Acceleration)
      const now = performance.now();
      const dt = now - lastFrameTime;
      lastFrameTime = now;

      const dx = mappedX - lastMappedX;
      const dy = mappedY - lastMappedY;
      const dDist = Math.sqrt(dx * dx + dy * dy);

      // Скорость (нормализованная по времени к 20ms)
      const speed = dDist / (dt || 20) * 20;

      // Коэффициент чувствительности: BASE_GAIN + speed * ACCEL_COEFF
      const currentGain = BASE_GAIN + speed * ACCEL_COEFF;

      cursorX += dx * currentGain;
      cursorY += dy * currentGain;

      // Clamp курсора
      cursorX = Math.max(0, Math.min(1, cursorX));
      cursorY = Math.max(0, Math.min(1, cursorY));

      lastMappedX = mappedX;
      lastMappedY = mappedY;

      // 3. Сглаживание курсора (LERP)
      smoothX = smoothX * SMOOTHING + cursorX * (1 - SMOOTHING);
      smoothY = smoothY * SMOOTHING + cursorY * (1 - SMOOTHING);

      const x = Math.max(0, Math.min(1, smoothX));
      const y = Math.max(0, Math.min(1, smoothY));

      // Pinch-жест
      const pinchDist = dist(thumb, index);

      if (!isPinching && pinchDist < PINCH_START_THRESH) {
        isPinching = true;
        pinchInd.classList.add('show');
        sendGesture({ type: 'PINCH_START', x, y });
        if (navigator.vibrate) navigator.vibrate(40);
      } else if (isPinching && pinchDist > PINCH_RELEASE_THRESH) {
        isPinching = false;
        pinchInd.classList.remove('show');
        sendGesture({ type: 'PINCH_END', x, y });
      }

      // Отправка MOVE с throttle
      if (now - lastSendTime >= SEND_INTERVAL_MS) {
        sendGesture({ type: 'MOVE', x, y });
        lastSendTime = now;
      }

      // Статус
      setStatus('tracking', isPinching ? '🤏 Клик!' : 'Трекинг');

      // Отладочные значения
      document.getElementById('sX').textContent = x.toFixed(2);
      document.getElementById('sY').textContent = y.toFixed(2);
      document.getElementById('sPinch').textContent = pinchDist.toFixed(3);

      // Подсветка pinch пальцев
      if (isPinching) {
        const W = canvasEl.width, H = canvasEl.height;
        [thumb, index].forEach(pt => {
          ctx.beginPath();
          ctx.arc(pt.x * W, pt.y * H, 14, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(34,197,94,0.5)';
          ctx.fill();
          ctx.strokeStyle = 'rgba(34,197,94,0.9)';
          ctx.lineWidth = 2;
          ctx.stroke();
        });
      }
    });

    // ═══════════════════════════════════════════════════════
    //  ЗАПУСК КАМЕРЫ
    // ═══════════════════════════════════════════════════════

    const camera = new Camera(videoEl, {
      onFrame: async () => { await hands.send({ image: videoEl }); },
      width: 640,
      height: 480,
      facingMode: 'user',
    });

    camera.start().catch(err => {
      alert('Нет доступа к камере: ' + err.message);
    });
    // Periodic state diagnostics log to calLog
    setInterval(() => {
      let iframeCount = 1;
      try {
        if (window.parent && window.parent !== window) {
          iframeCount = window.parent.document.querySelectorAll('iframe').length;
        }
      } catch (e) {}

      if (window.calibrationState !== 'NONE') {
        logDebug(`[DIAG] Global State: ${window.calibrationState}, X: ${window.calibrationData.xRaw.length}, Y: ${window.calibrationData.yRaw.length}, IFrames: ${iframeCount}`);
      }
    }, 1500);
  </script>
</body>
</html>
